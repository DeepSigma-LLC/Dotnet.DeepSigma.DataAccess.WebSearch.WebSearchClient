# Minimal SearXNG settings for local live testing.
# Inherits all defaults from the SearXNG image and only overrides what is
# required for the DeepSigma.DataAccess.WebSearch live tests to run.
#
# Usage:
#   docker compose up        (uses docker-compose.yml in this directory)
#
# The critical override is search.formats — the SearXNG Docker image ships
# with only "html" enabled, which causes HTTP 403 on JSON API requests.

use_default_settings: true

search:
  formats:
    - html
    - json
    
server:
  secret_key: "3f6c0a9f2b9140d5a8d3c7e1f4b8a2c9e7d1f6a3b5c8d0e2f4a6b8c1d3e5f7"